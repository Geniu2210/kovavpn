name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: 'stable'
          cache: true
      
      - name: Flutter Doctor
        run: flutter doctor -v
      
      - name: Install Dependencies
        run: flutter pub get
      
      - name: Decode Keystore (or create debug)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          else
            keytool -genkey -v -keystore android/app/release.keystore -alias kova_vpn -keyalg RSA -keysize 2048 -validity 10000 -storepass kova1234 -keypass kova1234 -dname "CN=KovaVPN, OU=KovaVPN, O=KovaVPN, L=Kiev, S=Kiev, C=UA"
          fi
      
      - name: Build Release APKs (Split)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'kova1234' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'kova_vpn' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'kova1234' }}
        run: |
          flutter build apk --release --split-per-abi \
            --target-platform android-arm,android-arm64,android-x64
      
      - name: Build Universal APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'kova1234' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'kova_vpn' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'kova1234' }}
        run: |
          flutter build apk --release
      
      - name: Get Version
        id: version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Prepare Release Files
        run: |
          mkdir -p release-apks
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-x86_64.apk
          cp build/app/outputs/flutter-apk/app-release.apk release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-universal.apk
      
      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: KOVA-VPN-arm64-v8a
          path: release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-arm64-v8a.apk
      
      - name: Upload ARMv7 APK
        uses: actions/upload-artifact@v4
        with:
          name: KOVA-VPN-armeabi-v7a
          path: release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-armeabi-v7a.apk
      
      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: KOVA-VPN-x86_64
          path: release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-x86_64.apk
      
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: KOVA-VPN-universal
          path: release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-universal.apk
      
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-arm64-v8a.apk
            release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-armeabi-v7a.apk
            release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-x86_64.apk
            release-apks/KOVA-VPN-${{ steps.version.outputs.version }}-universal.apk
          body: |
            ## KOVA VPN ${{ steps.version.outputs.version }}
            
            ### Downloads
            
            | Architecture | File | Devices |
            |-------------|------|---------|
            | ARM64-v8a | `KOVA-VPN-${{ steps.version.outputs.version }}-arm64-v8a.apk` | Modern devices (2015+) - **Recommended** |
            | ARMv7a | `KOVA-VPN-${{ steps.version.outputs.version }}-armeabi-v7a.apk` | Older devices |
            | x86_64 | `KOVA-VPN-${{ steps.version.outputs.version }}-x86_64.apk` | Emulators/x86 devices |
            | Universal | `KOVA-VPN-${{ steps.version.outputs.version }}-universal.apk` | All devices (larger size) |
            
            ### Installation
            
            1. Download the appropriate APK for your device
            2. Enable "Install from Unknown Sources" in Android settings
            3. Install the APK
            4. Grant VPN and notification permissions
            
            ---
            
            Developed by KOVA VPN Team
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
